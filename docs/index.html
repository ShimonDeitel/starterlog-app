<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sourdough Starter Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#1F1B14; color:#F8F0DD; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:560px; text-align:center; padding:40px 24px; }
  h1 { font-size:2.2rem; margin-bottom:8px; color:#D9A441; }
  p.tag { color:#E8C87A; font-size:1.1rem; margin-bottom:32px; }
  .cta { display:inline-block; background:#D9A441; color:#fff; padding:14px 28px; border-radius:12px; text-decoration:none; font-weight:600; }
  footer { margin-top:40px; font-size:0.85rem; color:#E8C87A; }
  a { color:#D9A441; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #D9A44155 0%, #D9A44100 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Sourdough Starter Log</h1>
    <p class="tag">Track your sourdough starter's feeding schedule and rise activity.</p>
    <a class="cta" href="#">Coming to the App Store</a>
    <footer>
      <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
      <p>Contact: s0533495227@gmail.com</p>
    </footer>
  </div>
</body>
</html>
