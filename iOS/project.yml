name: SourdoughStarterLog
options:
  bundleIdPrefix: com.shimondeitel.sourdough
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SourdoughStarterLog:
    type: application
    platform: iOS
    sources:
      - path: SourdoughStarterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sourdough
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SourdoughStarterLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SourdoughStarterLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SourdoughStarterLogTests
      - path: SourdoughStarterLog.storekit
    dependencies:
      - target: SourdoughStarterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sourdough.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SourdoughStarterLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SourdoughStarterLogUITests
    dependencies:
      - target: SourdoughStarterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sourdough.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SourdoughStarterLog:
    build:
      targets:
        SourdoughStarterLog: all
        SourdoughStarterLogTests: [test]
        SourdoughStarterLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SourdoughStarterLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SourdoughStarterLog.storekit
      targets:
        - SourdoughStarterLogTests
        - SourdoughStarterLogUITests
    archive:
      config: Release
